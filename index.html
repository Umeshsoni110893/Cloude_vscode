<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Login Section -->
    <section id="login-section">
      <h1>Login</h1>
      <input id="username" type="text" placeholder="Username">
      <input id="password" type="password" placeholder="Password">
      <button id="login-btn" class="btn-primary">Login</button>
      <p id="login-error" style="color:red; display:none;">Invalid credentials</p>
    </section>

    <!-- Products Section -->
    <section id="products-section" class="hidden">
      <h1>Products</h1>
      <div class="product-card">
        <span>Laptop - $999</span>
        <button class="add-to-cart">Add to Cart</button>
      </div>
      <div class="product-card">
        <span>Smartphone - $499</span>
        <button class="add-to-cart-typo">Add to Cart</button>
      </div>
      <button id="view-cart-btn" class="btn-primary">View Cart</button>
      <span id="cart-count">0</span>
    </section>

    <!-- Cart Section -->
    <section id="cart-section" class="hidden">
      <h1>Cart</h1>
      <ul id="cart-items"></ul>
      <p id="cart-total">Total: $0</p>
      <button id="checkout-btn" class="btn-primary">Checkout</button>
      <button id="back-btn">Back to Products</button>
    </section>

    <!-- Success Section -->
    <section id="success-section" class="hidden">
      <h1>Order placed successfully!</h1>
      <button id="restart-btn" class="btn-primary">Shop Again</button>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
